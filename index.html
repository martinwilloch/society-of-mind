<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Society of Mind</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F4EDD8;
      --purple: #2D1B69;
      --purple-mid: #4A2F8F;
      --purple-light: #7B5EA7;
      --purple-faint: rgba(45, 27, 105, 0.12);
      --purple-line: rgba(45, 27, 105, 0.25);
      --panel-bg: rgba(244, 237, 216, 0.97);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--purple);
      font-family: 'Georgia', 'Times New Roman', serif;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
    }

    /* Header */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 2rem 3rem 1.5rem;
      pointer-events: none;
      background: linear-gradient(to bottom, var(--bg) 60%, transparent);
    }

    header h1 {
      font-size: clamp(1.6rem, 4vw, 3rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--purple);
      line-height: 1.1;
    }

    header p {
      margin-top: 0.4rem;
      font-size: clamp(0.75rem, 1.4vw, 0.95rem);
      color: var(--purple-mid);
      letter-spacing: 0.08em;
      font-style: italic;
    }

    /* Hint */
    #hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 0.78rem;
      color: var(--purple-light);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1s ease;
    }

    /* Info panel */
    #panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.94);
      z-index: 20;
      width: min(560px, 92vw);
      background: var(--panel-bg);
      border: 1px solid var(--purple-faint);
      box-shadow:
        0 0 0 1px var(--purple-faint),
        0 8px 48px rgba(45, 27, 105, 0.18),
        0 2px 8px rgba(45, 27, 105, 0.1);
      padding: 2.4rem 2.8rem 2.2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    #panel.visible {
      opacity: 1;
      pointer-events: all;
      transform: translate(-50%, -50%) scale(1);
    }

    #panel-chapter {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--purple-light);
      margin-bottom: 0.6rem;
    }

    #panel-title {
      font-size: clamp(1.3rem, 3vw, 1.9rem);
      font-weight: 400;
      color: var(--purple);
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    #panel-body {
      font-size: 0.92rem;
      line-height: 1.75;
      color: var(--purple-mid);
    }

    #panel-body p + p { margin-top: 0.8rem; }

    #panel-quote {
      margin-top: 1.2rem;
      padding: 0.9rem 1.2rem;
      border-left: 2px solid var(--purple-light);
      font-style: italic;
      font-size: 0.88rem;
      color: var(--purple-light);
      line-height: 1.65;
    }

    #panel-close {
      position: absolute;
      top: 1.2rem; right: 1.4rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.4rem;
      color: var(--purple-light);
      line-height: 1;
      padding: 0.2rem 0.4rem;
      transition: color 0.2s;
    }

    #panel-close:hover { color: var(--purple); }

    /* Overlay */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 15;
      background: rgba(45, 27, 105, 0.08);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    #overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<header>
  <h1>Society of Mind</h1>
  <p>Marvin Minsky &mdash; A theory of intelligence as society</p>
</header>

<div id="hint">Select a node to explore</div>

<div id="overlay"></div>

<div id="panel">
  <button id="panel-close">&#215;</button>
  <div id="panel-chapter"></div>
  <div id="panel-title"></div>
  <div id="panel-body"></div>
  <div id="panel-quote"></div>
</div>

<script>
const NODES = [
  {
    id: 0, label: "Agents",
    chapter: "Chapter 1 — Building Blocks",
    title: "Agents",
    body: `<p>An agent is any process that has a specific function within the mind. Agents are individually simple — each one does something narrow and mechanical. None of them is "intelligent" in isolation.</p><p>What makes mind remarkable is not any single agent but the intricate web of interactions among thousands of them. Intelligence is not a property of any part, but of the whole society.</p>`,
    quote: `"Each mental agent by itself can only do a simple thing that needs no mind or thought at all."`,
    connections: [1, 2, 5, 14, 25]
  },
  {
    id: 1, label: "Society",
    chapter: "Chapter 1 — Building Blocks",
    title: "The Society of Mind",
    body: `<p>The mind works like a society: many agents, each with their own limited function, interacting to produce behavior that no single member could achieve alone. There is no central authority.</p><p>Just as no single citizen makes a city intelligent, no single neuron or agent makes a mind conscious. The structure of the whole is what matters.</p>`,
    quote: `"You can build a mind from many little parts, each mindless by itself."`,
    connections: [0, 2, 8, 22, 26]
  },
  {
    id: 2, label: "Builder",
    chapter: "Chapter 1 — Building Blocks",
    title: "Builder & Subagents",
    body: `<p>Minsky uses the example of Builder — an agent whose job is to build a block tower. Builder itself doesn't know how to do anything specific; it manages subagents: Add, Move, Get, Find, Pick-up, Put-down.</p><p>Each subagent does one thing. Builder orchestrates them. This hierarchy is the basic pattern of all mental organization.</p>`,
    quote: `"Builder's agents know nothing of each other's work. Builder only sees if the tower grows."`,
    connections: [0, 13, 19, 25]
  },
  {
    id: 3, label: "K-lines",
    chapter: "Chapter 8 — A Theory of Memory",
    title: "Knowledge Lines (K-lines)",
    body: `<p>A K-line is a wire-like connection that links together all the agents that were active when you learned something or had a useful thought. When a K-line is activated later, it re-activates the same partial state of mind.</p><p>K-lines explain how we re-enter old mental states — how a smell can summon a memory, or why solving one problem makes similar problems easier.</p>`,
    quote: `"When you 'get an idea,' a new K-line forms to record which agents were involved."`,
    connections: [0, 4, 9, 16, 24]
  },
  {
    id: 4, label: "B-Brain",
    chapter: "Chapter 6 — Insight",
    title: "The B-Brain",
    body: `<p>Imagine your brain is called the A-brain. Now imagine a second brain — the B-brain — whose inputs come entirely from the A-brain rather than from the outside world. The B-brain thinks about thinking.</p><p>This is Minsky's model of self-reflection. The B-brain cannot perceive the world directly, so it can be wrong about what the A-brain is really doing. This explains the deep limits of introspection.</p>`,
    quote: `"The B-brain can watch the A-brain's work — but only see a shadow of it."`,
    connections: [3, 17, 20, 22]
  },
  {
    id: 5, label: "Frames",
    chapter: "Chapter 24 — Frames of Mind",
    title: "Frames",
    body: `<p>A frame is a data structure that represents a stereotyped situation — like "entering a room" or "a birthday party." Each frame has slots that can be filled with specific details, and each slot has default values for when information is absent.</p><p>Frames explain how we rapidly interpret new situations: we find a familiar frame, then adjust it to fit the particulars. Most understanding is this kind of controlled hallucination.</p>`,
    quote: `"We see with expectations, not just with eyes. Frames shape every perception."`,
    connections: [0, 6, 7, 10, 21]
  },
  {
    id: 6, label: "Frame Arrays",
    chapter: "Chapter 25 — Frame Arrays",
    title: "Frame Arrays",
    body: `<p>When we move our head or change viewpoint, we don't re-interpret the world from scratch. Frame arrays are grids of frames — each representing a slightly different perspective on the same scene.</p><p>Switching between frames in the array is cheap. This is how we maintain the illusion of a stable, continuous world even though our eyes make jerky movements and our attention constantly shifts.</p>`,
    quote: `"The mind maintains a map of frames — not one picture, but a connected gallery."`,
    connections: [5, 18, 21]
  },
  {
    id: 7, label: "Defaults",
    chapter: "Chapter 12 — Learning Meaning",
    title: "Default Assumptions",
    body: `<p>Every frame has default values — assumptions we make in the absence of contrary information. When you hear "bird," you assume it can fly. When you enter a restaurant, you expect tables, a menu, a server.</p><p>Defaults are not errors; they are the efficient engine of cognition. Most of the time they're right. The cost is that we are sometimes confidently wrong about things we haven't really thought about.</p>`,
    quote: `"We fill the world with assumptions. Mostly they serve us. Sometimes they bind us."`,
    connections: [5, 10, 12, 23]
  },
  {
    id: 8, label: "Polynemes",
    chapter: "Chapter 19 — Words and Ideas",
    title: "Polynemes",
    body: `<p>A polyneme is an agent that connects to many different agents across the mind simultaneously. When "apple" is activated, the polyneme for apple fires agents for redness, roundness, sweetness, crunchiness — each in its own domain.</p><p>Words work as polynemes. They don't contain meaning; they distribute activation across the specialists who hold the meaning.</p>`,
    quote: `"A word does not hold meaning — it sends signals to the agents that do."`,
    connections: [3, 1, 24, 27]
  },
  {
    id: 9, label: "Nemes",
    chapter: "Chapter 8 — Memory",
    title: "Nemes",
    body: `<p>A neme is any agent whose activity represents something to other parts of the mind. Nemes are the atomic units of mental representation — single agents that carry meaning by virtue of their connections and when they fire.</p><p>Complex thoughts are built from constellations of nemes activating together.</p>`,
    quote: `"Each neme carries a small piece of the world model inside the mind."`,
    connections: [3, 8, 0]
  },
  {
    id: 10, label: "Non-compromise",
    chapter: "Chapter 3 — Conflict and Compromise",
    title: "The Principle of Non-Compromise",
    body: `<p>When two agents conflict, the mind often cannot find a middle ground. If one agent says "turn left" and another says "turn right," going straight is not a compromise — it's a third, unrelated action.</p><p>Mental conflicts are often resolved not by averaging but by one agent suppressing the other, or by a higher-level agent choosing between them. This is why decisions can feel sudden and total.</p>`,
    quote: `"In most mental conflicts, there is no compromise. One side wins; the other is silenced."`,
    connections: [11, 15, 22, 1]
  },
  {
    id: 11, label: "Censors",
    chapter: "Chapter 27 — Censors and Jokes",
    title: "Censors",
    body: `<p>Censors are agents whose job is to suppress other agents. They don't generate behavior — they prevent it. A censor might block an idea before it reaches consciousness, or inhibit an action before it begins.</p><p>Jokes often work by momentarily bypassing censors — allowing a normally-forbidden thought to surface before the censor can respond. Humor is the censor's brief vacation.</p>`,
    quote: `"The censor does not create — it forbids. Most of what we might think, we never think."`,
    connections: [10, 20, 26, 15]
  },
  {
    id: 12, label: "The Self",
    chapter: "Chapter 4 — Self",
    title: "The Self",
    body: `<p>There is no single agent in the mind that is "the self." The feeling of being a unified self is itself produced by agents — it is a model the mind builds of itself, not a real unified thing.</p><p>The self-model is useful: it lets the mind predict its own behavior. But mistaking the model for the reality — thinking there truly is a little person inside — is the homunculus fallacy.</p>`,
    quote: `"The 'self' is not a thing but a society's story about itself."`,
    connections: [4, 17, 20, 22, 1]
  },
  {
    id: 13, label: "Subgoals",
    chapter: "Chapter 7 — Problems and Goals",
    title: "Subgoals",
    body: `<p>Any complex goal must be broken into subgoals. But who does the breaking? Higher-level agents decompose goals and assign them to lower-level specialists. The lower level doesn't know about the larger goal.</p><p>This hierarchical decomposition is why intelligent behavior can emerge without any part needing a complete picture. Each agent only solves its own small problem.</p>`,
    quote: `"The agent that builds doesn't know why it builds. It only knows: place block here."`,
    connections: [2, 0, 19, 25]
  },
  {
    id: 14, label: "Levels",
    chapter: "Chapter 10 — Levels",
    title: "Level-bands",
    body: `<p>Agents are organized in levels. High-level agents are concerned with abstract goals and long time horizons. Low-level agents handle immediate sensory or motor specifics. Mid-level agents translate between the two.</p><p>Each level speaks a different "language." The high-level agent says "build a tower." By the time the signal reaches the muscle-controlling agents, it has become "increase tension in fiber group 37."</p>`,
    quote: `"The mind is a tower of languages, each translating for the ones above and below."`,
    connections: [0, 2, 13, 25]
  },
  {
    id: 15, label: "Reactance",
    chapter: "Chapter 3 — Conflict",
    title: "Reactance & Frustration",
    body: `<p>When an agent is blocked from achieving its goal, it doesn't simply stop. It may try alternative strategies, increase its urgency, or recruit other agents. This persistent redirection is called reactance.</p><p>Frustration arises when reactance fails repeatedly. The blocked agent's growing urgency can disrupt surrounding processes — a model for how human frustration spreads into unrelated areas of behavior.</p>`,
    quote: `"A blocked agent does not accept defeat — it searches, recruits, and persists."`,
    connections: [10, 13, 11, 19]
  },
  {
    id: 16, label: "Memory",
    chapter: "Chapter 15 — Consciousness",
    title: "Memory Types",
    body: `<p>Minsky distinguishes memory not by duration (short vs. long term) but by mechanism. K-line memory re-activates agent states. Iconic memory holds sensory images briefly. Narrative memory stores sequences of K-lines.</p><p>Memory is not a storage device — it is a set of re-activation mechanisms. To remember is to partially re-create a past mental state.</p>`,
    quote: `"To remember is not to retrieve — it is to rebuild, imperfectly, a former self."`,
    connections: [3, 5, 24, 9]
  },
  {
    id: 17, label: "Introspection",
    chapter: "Chapter 6 — Insight",
    title: "Limits of Introspection",
    body: `<p>We cannot directly observe our own mental processes. The B-brain can only watch the A-brain's outputs, not its internal mechanics. So when we report on why we made a decision, we are often confabulating — telling a plausible story rather than reporting a fact.</p><p>This explains why people are so confidently wrong about their own motivations and why verbal reports of mental states must be treated with caution.</p>`,
    quote: `"Introspection reveals only a small part of what the mind is doing — and distorts even that."`,
    connections: [4, 12, 22, 20]
  },
  {
    id: 18, label: "Space",
    chapter: "Chapter 11 — Shape of Space",
    title: "Spatial Reasoning",
    body: `<p>The mind has specialized agencies for representing and reasoning about space. These don't work like a camera — spatial representations are functional and action-oriented. We represent "where things are" in terms of how we would reach or move toward them.</p><p>Different spatial frames can be maintained simultaneously: body-centered, room-centered, object-centered. Frame arrays switch smoothly between these views.</p>`,
    quote: `"Space is not perceived — it is constructed, by agencies built for action, not for seeing."`,
    connections: [5, 6, 21]
  },
  {
    id: 19, label: "Difference-Engines",
    chapter: "Chapter 7 — Goals",
    title: "Difference-Engines",
    body: `<p>A difference-engine is an agent that detects a discrepancy between the current state and a goal state, then acts to reduce that discrepancy. This simple mechanism drives most purposeful behavior.</p><p>Goal-directed action doesn't require a complete plan — only the ability to sense what is wrong and take a step toward making it less wrong. This is the minimal architecture of striving.</p>`,
    quote: `"Goals are not blueprints — they are complaints about the present state of things."`,
    connections: [13, 15, 2, 0]
  },
  {
    id: 20, label: "Consciousness",
    chapter: "Chapter 15 — Consciousness",
    title: "Consciousness",
    body: `<p>Minsky is skeptical of consciousness as a special substance or property. Instead, consciousness is what certain information-processing activities feel like from the inside — or more precisely, what gets reported by the B-brain as it observes the A-brain.</p><p>There is no single seat of consciousness. Different kinds of "being aware" correspond to different agent activities. The unity of consciousness is another useful illusion.</p>`,
    quote: `"Consciousness is not a place in the brain — it is a process that watches other processes."`,
    connections: [4, 12, 17, 11, 1]
  },
  {
    id: 21, label: "Trans-frames",
    chapter: "Chapter 21 — Trans-frames",
    title: "Trans-frames",
    body: `<p>A trans-frame represents a transition — the before and after of an action or event. It captures: who acts, on what, with what instrument, causing what change, starting from what state, ending in what state.</p><p>Trans-frames are the basic units of narrative and causal understanding. Stories are chains of trans-frames. Verbs activate trans-frames. Understanding an action means filling in the trans-frame's slots.</p>`,
    quote: `"Every action has a before and after. The mind holds both together in a trans-frame."`,
    connections: [5, 6, 27, 8]
  },
  {
    id: 22, label: "Homunculus",
    chapter: "Chapter 4 — Self",
    title: "The Homunculus Problem",
    body: `<p>The homunculus fallacy is the mistake of explaining the mind by positing a "little person inside" who does the understanding. But that little person needs its own little person, and so on forever.</p><p>Minsky's society of mind avoids this by showing that what looks like a single observer is actually built from many agents, none of which requires a homunculus of its own. Understanding emerges from structure, not from a central knower.</p>`,
    quote: `"If you need a little man in the head to explain the mind, you have explained nothing."`,
    connections: [12, 1, 4, 20]
  },
  {
    id: 23, label: "Learning",
    chapter: "Chapter 17 — Development",
    title: "Learning",
    body: `<p>Learning, for Minsky, is primarily about forming new K-lines and modifying the connections between agents. When something works, the agents involved get linked — future problems that activate some of them will tend to activate the rest.</p><p>Much learning is not conscious. New default assumptions form silently. Agencies reconfigure themselves based on success and failure without any central supervisor deciding what has been learned.</p>`,
    quote: `"Learning is not the filling of a vessel — it is the rewiring of a network."`,
    connections: [3, 7, 9, 24]
  },
  {
    id: 24, label: "Papert's Principle",
    chapter: "Chapter 10 — Levels",
    title: "Papert's Principle",
    body: `<p>Named for Seymour Papert, this principle states: some of the most critical steps in mental growth are not about learning new skills, but about building new administrative processes that organize the skills you already have.</p><p>A child may already know how to count and how to recognize objects, but still struggle to count objects — because the administrative agency that coordinates the two hasn't formed yet. New capability sometimes means new management, not new knowledge.</p>`,
    quote: `"Progress often comes not from new knowledge but from new ways of organizing old knowledge."`,
    connections: [14, 23, 2, 13]
  },
  {
    id: 25, label: "Instincts",
    chapter: "Chapter 5 — Individuality",
    title: "Instincts",
    body: `<p>Instincts are agents built in by evolution rather than learned from experience. They come pre-wired and ready to activate in response to specific triggers — hunger, fear, attraction, pain.</p><p>Instinctive agents are not necessarily simple, but they operate independently of conscious deliberation. They are the part of the society that predates the individual.</p>`,
    quote: `"Instincts are ancient agents — recruited by evolution long before we could think."`,
    connections: [0, 26, 10, 15]
  },
  {
    id: 26, label: "Emotion",
    chapter: "Chapter 16 — Emotion",
    title: "Emotion",
    body: `<p>Emotions are not opposed to thinking — they are a kind of thinking. An emotional state is a configuration of agents that biases the rest of the mind: fear suppresses exploration and amplifies threat-detection; joy amplifies engagement and exploration.</p><p>Minsky rejects the idea that emotions are irrational interruptions. They are high-level control signals that shift the mind's operating mode.</p>`,
    quote: `"Emotions are not the enemy of reason — they are reason's older, cruder cousin."`,
    connections: [25, 11, 15, 20, 12]
  },
  {
    id: 27, label: "Language",
    chapter: "Chapter 22 — Expression",
    title: "Language",
    body: `<p>Words are not containers for meaning — they are signals that recruit agents. The word "apple" doesn't carry redness or sweetness; it activates the agents that represent those things. This is why the same word means different things in different contexts.</p><p>Language works because speaker and listener share enough agent structure that the same word activates similar clusters of agents in both minds. Communication is approximate synchronization of agent states.</p>`,
    quote: `"Words are not meanings — they are invitations to build meanings from within."`,
    connections: [8, 21, 9, 1, 5]
  }
];

// Build connection set
const connectionSet = new Set();
NODES.forEach(n => {
  n.connections.forEach(c => {
    const key = [Math.min(n.id, c), Math.max(n.id, c)].join('-');
    connectionSet.add(key);
  });
});
const EDGES = [...connectionSet].map(k => k.split('-').map(Number));

// Canvas setup
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H, dpr;
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  placeNodes();
}

// Node positions & velocities
let nodes = [];
function placeNodes() {
  const margin = 100;
  nodes = NODES.map((n, i) => ({
    ...n,
    x: margin + Math.random() * (W - margin * 2),
    y: margin + Math.random() * (H - margin * 2),
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    r: 9,
    hovered: false,
    pulse: Math.random() * Math.PI * 2,
    pulseSpeed: 0.008 + Math.random() * 0.008
  }));
}

// Pulse particles along edges
const particles = [];
function spawnParticle(edgeIndex) {
  const [a, b] = EDGES[edgeIndex];
  particles.push({ a, b, t: 0, speed: 0.0015 + Math.random() * 0.002, edge: edgeIndex });
}
// Seed initial particles
function seedParticles() {
  EDGES.forEach((_, i) => {
    if (Math.random() < 0.5) spawnParticle(i);
  });
}

let selectedNode = null;
let hoveredNode = null;

// Panel elements
const panel = document.getElementById('panel');
const overlay = document.getElementById('overlay');
const hint = document.getElementById('hint');
let hintHidden = false;

function showPanel(node) {
  selectedNode = node;
  document.getElementById('panel-chapter').textContent = node.chapter;
  document.getElementById('panel-title').textContent = node.title;
  document.getElementById('panel-body').innerHTML = node.body;
  document.getElementById('panel-quote').textContent = node.quote;
  panel.classList.add('visible');
  overlay.classList.add('visible');
  if (!hintHidden) {
    hint.style.opacity = '0';
    hintHidden = true;
  }
}

function hidePanel() {
  selectedNode = null;
  panel.classList.remove('visible');
  overlay.classList.remove('visible');
}

document.getElementById('panel-close').addEventListener('click', hidePanel);
overlay.addEventListener('click', hidePanel);

// Mouse / touch
const mouse = { x: -9999, y: -9999 };

canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

canvas.addEventListener('click', e => {
  const hit = nodeAt(e.clientX, e.clientY);
  if (hit) showPanel(hit);
});

canvas.addEventListener('touchend', e => {
  const t = e.changedTouches[0];
  const hit = nodeAt(t.clientX, t.clientY);
  if (hit) showPanel(hit);
  e.preventDefault();
}, { passive: false });

function nodeAt(x, y) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dx = n.x - x, dy = n.y - y;
    if (dx * dx + dy * dy < (n.r + 10) * (n.r + 10)) return n;
  }
  return null;
}

// Colors
const COL_BG        = '#F4EDD8';
const COL_NODE      = '#2D1B69';
const COL_NODE_HOV  = '#6B4EAA';
const COL_NODE_SEL  = '#4A2F8F';
const COL_CONN_DIM  = [45, 27, 105];
const COL_CONN_HOV  = [74, 47, 143];

function rgba(rgb, a) { return `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${a})`; }

// Draw
function draw(ts) {
  ctx.clearRect(0, 0, W, H);

  // Update node positions
  const margin = 60;
  nodes.forEach(n => {
    n.pulse += n.pulseSpeed;
    n.x += n.vx;
    n.y += n.vy;
    if (n.x < margin || n.x > W - margin) n.vx *= -1;
    if (n.y < margin || n.y > H - margin) n.vy *= -1;
    n.x = Math.max(margin, Math.min(W - margin, n.x));
    n.y = Math.max(margin, Math.min(H - margin, n.y));

    // Soft repulsion between nodes
    nodes.forEach(m => {
      if (m.id === n.id) return;
      const dx = n.x - m.x, dy = n.y - m.y;
      const d2 = dx * dx + dy * dy;
      if (d2 < 6400) {
        const d = Math.sqrt(d2) || 1;
        const f = 0.04 / d;
        n.vx += (dx / d) * f;
        n.vy += (dy / d) * f;
      }
    });

    // Speed cap
    const spd = Math.sqrt(n.vx * n.vx + n.vy * n.vy);
    if (spd > 0.6) { n.vx *= 0.6 / spd; n.vy *= 0.6 / spd; }

    // Hover detection
    const dx = n.x - mouse.x, dy = n.y - mouse.y;
    n.hovered = dx * dx + dy * dy < (n.r + 10) * (n.r + 10);
  });
  hoveredNode = nodes.find(n => n.hovered) || null;

  // Update / draw particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.t += p.speed;
    if (p.t >= 1) { particles.splice(i, 1); continue; }
    const na = nodes[p.a], nb = nodes[p.b];
    if (!na || !nb) { particles.splice(i, 1); continue; }
  }
  // Occasionally spawn
  if (Math.random() < 0.04 && particles.length < 60) {
    spawnParticle(Math.floor(Math.random() * EDGES.length));
  }

  // Draw edges
  EDGES.forEach(([ai, bi]) => {
    const na = nodes[ai], nb = nodes[bi];
    if (!na || !nb) return;
    const isHighlighted = (hoveredNode && (hoveredNode.id === ai || hoveredNode.id === bi))
                       || (selectedNode && (selectedNode.id === ai || selectedNode.id === bi));
    const alpha = isHighlighted ? 0.45 : 0.14;
    const col = isHighlighted ? COL_CONN_HOV : COL_CONN_DIM;
    ctx.beginPath();
    ctx.moveTo(na.x, na.y);
    ctx.lineTo(nb.x, nb.y);
    ctx.strokeStyle = rgba(col, alpha);
    ctx.lineWidth = isHighlighted ? 1.5 : 0.8;
    ctx.stroke();
  });

  // Draw particle dots on edges
  particles.forEach(p => {
    const na = nodes[p.a], nb = nodes[p.b];
    if (!na || !nb) return;
    const x = na.x + (nb.x - na.x) * p.t;
    const y = na.y + (nb.y - na.y) * p.t;
    const alpha = Math.sin(p.t * Math.PI) * 0.7;
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, Math.PI * 2);
    ctx.fillStyle = rgba(COL_CONN_HOV, alpha);
    ctx.fill();
  });

  // Draw nodes
  nodes.forEach(n => {
    const isSelected = selectedNode && selectedNode.id === n.id;
    const isConn = (hoveredNode && hoveredNode.connections.includes(n.id))
                || (selectedNode && selectedNode.connections.includes(n.id));
    const pulse = 1 + Math.sin(n.pulse) * 0.12;
    const r = n.r * (isSelected ? 1.5 : n.hovered ? 1.3 : isConn ? 1.15 : 1) * pulse;

    // Glow for selected/hovered
    if (isSelected || n.hovered) {
      const grd = ctx.createRadialGradient(n.x, n.y, r * 0.5, n.x, n.y, r * 3.5);
      grd.addColorStop(0, rgba(COL_CONN_HOV, 0.18));
      grd.addColorStop(1, rgba(COL_CONN_HOV, 0));
      ctx.beginPath();
      ctx.arc(n.x, n.y, r * 3.5, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // Node fill
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = isSelected ? COL_NODE_SEL : n.hovered ? COL_NODE_HOV : isConn ? '#5B3FA0' : COL_NODE;
    ctx.fill();

    // Label
    const labelAlpha = n.hovered || isSelected || isConn ? 1 : 0.72;
    ctx.font = `${n.hovered || isSelected ? 600 : 400} ${clamp(10, 12, 14)}px 'Georgia', serif`;
    ctx.fillStyle = `rgba(45,27,105,${labelAlpha})`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(n.label, n.x, n.y + r + 5);
  });

  // Cursor
  canvas.style.cursor = hoveredNode ? 'pointer' : 'default';

  requestAnimationFrame(draw);
}

function clamp(min, v, max) { return Math.max(min, Math.min(max, v)); }

window.addEventListener('resize', () => { ctx.setTransform(1, 0, 0, 1, 0, 0); resize(); });
resize();
seedParticles();
requestAnimationFrame(draw);
</script>
</body>
</html>
